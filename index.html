<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>ChatApp · Secure Messenger</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div id="auth-screen" class="auth-container">
    <div class="auth-card">
        <div class="auth-logo">
            <i class="fas fa-comet"></i>
            <h1>ChatApp</h1>
            <p class="tagline">fast · encrypted · realtime</p>
        </div>
        <div id="error-msg" class="error-message"></div>
        <div class="input-group">
            <i class="fas fa-user-astronaut"></i>
            <input type="text" id="username" placeholder="Username" autocomplete="off">
        </div>
        <div class="input-group">
            <i class="fas fa-key"></i>
            <input type="password" id="password" placeholder="Password">
        </div>
        <div class="auth-buttons">
            <button class="btn-primary" id="login-btn">Log In</button>
            <button class="btn-secondary" id="signup-btn">Create Account</button>
        </div>
    </div>
</div>

<div id="chat-screen" class="chat-container" style="display: none;">
    <div id="sidebar-overlay" class="sidebar-overlay"></div>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="user-profile">
                <div class="avatar"><i class="fas fa-user-circle"></i></div>
                <div class="user-info">
                    <span id="current-user-display">User</span>
                    <span class="status online"><i class="fas fa-circle" style="font-size: 8px;"></i> Online</span>
                </div>
            </div>
            <button class="logout-btn" id="logout-btn" title="Logout"><i class="fas fa-sign-out-alt"></i></button>
        </div>
        <div class="search-section">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="user-search" placeholder="Find friends...">
            </div>
        </div>
        <div class="users-list">
            <div class="section-title">DIRECT MESSAGES</div>
            <div id="users-container"></div>
        </div>
    </div>

    <div class="chat-main">
        <div class="chat-header">
            <button class="menu-toggle" id="menuToggleBtn"><i class="fas fa-bars"></i></button>
            <div class="chat-partner-info">
                <div class="avatar-small"><i class="fas fa-user-friends"></i></div>
                <div class="partner-details">
                    <span id="partner-name">Select a chat</span>
                </div>
            </div>
        </div>
        <div class="chat-messages" id="messages-container">
            <div class="welcome-message" id="welcome-message">
                <i class="fas fa-comment-dots"></i>
                <h3>Conversations</h3>
                <p>Tap a user to start messaging</p>
            </div>
            <div id="messages-list"></div>
        </div>
        
        <div class="message-input-container" style="position: relative;">
            <div id="attachment-preview" class="attachment-preview" style="display: none;">
                <i class="fas fa-file-image"></i>
                <span id="preview-filename" class="preview-filename"></span>
                <button id="clear-attachment" title="Remove attachment"><i class="fas fa-times"></i></button>
            </div>

            <div class="message-input-area">
                <input type="file" id="file-input" accept="image/*,video/*" style="display: none;">
                <button id="attach-btn" class="attach-btn" disabled><i class="fas fa-paperclip"></i></button>
                
                <div class="message-input-wrapper">
                    <input type="text" id="message-input" placeholder="Select a user to start typing..." disabled>
                </div>
                <button id="send-btn" class="send-btn" disabled><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>
</div>

<div id="toast" class="toast"></div>

<script src="app.js"></script>
</body>
</html>
